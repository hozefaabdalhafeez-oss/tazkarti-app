
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مراجعة الحجز - تذكرتي</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:450px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px #ccc;
}

.item{
    margin:15px 0;
    font-size:18px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>مراجعة الحجز</h1>
</header>

<div class="container">

<div class="item">🚌 الرحلة: <span id="trip"></span></div>

<div class="item">💺 المقعد: <span id="seat"></span></div>
<div class="item">👤 الاسم: <span id="name"></span></div>
<div class="item">📞 الهاتف: <span id="phone"></span></div>
<a href="payment.html">
<button>الانتقال إلى الدفع</button>
</a>

</div>
<script>
let from = localStorage.getItem("from");
let to = localStorage.getItem("to");

document.getElementById("trip").innerText = from + " → " + to;
document.getElementById("seat").innerText = localStorage.getItem("seat");
document.getElementById("name").innerText = localStorage.getItem("name");
document.getElementById("phone").innerText = localStorage.getItem("phone");
</script>
</body>
</html>
