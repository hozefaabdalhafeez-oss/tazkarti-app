
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيانات الراكب - تذكرتي</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:400px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px #ccc;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>بيانات الراكب</h1>
</header>

<div class="container">

<label>الاسم الكامل</label>
<input id="name" type="text" placeholder="اكتب الاسم الكامل">
<label>رقم الهاتف</label>
<input id="phone" type="tel" placeholder="09XXXXXXXX">

<button onclick="savePassenger()">متابعة</button>

</div>
<script>
function savePassenger(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

localStorage.setItem("name", name);
localStorage.setItem("phone", phone);

window.location.href = "review.html";

}
</script>
</body>
</html>
