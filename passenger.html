<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>بيانات الراكب - تذكرتي</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f7fa;
    text-align:center;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    padding:20px;
    font-size:26px;
}

.card{
    background:white;
    max-width:450px;
    margin:25px auto;
    padding:20px;
    border-radius:12px;
}

input,button{
    width:90%;
    padding:15px;
    margin:10px;
    font-size:18px;
    border-radius:8px;
}

input{
    border:1px solid #ccc;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
}

.info{
    background:#f1f1f1;
    padding:10px;
    border-radius:8px;
    margin:10px;
}
</style>

</head>

<body>

<header>
🚌 تذكرتي
</header>


<div class="card">

<h2>بيانات الراكب</h2>

<div class="info" id="bookingInfo"></div>

<input id="name" type="text" placeholder="اسم الراكب">

<input id="phone" type="text" placeholder="رقم الهاتف">


<button onclick="savePassenger()">
متابعة
</button>


</div>


<script>

let trip = localStorage.getItem("selectedTrip");
let seat = localStorage.getItem("selectedSeat");


document.getElementById("bookingInfo").innerHTML =
"الرحلة: " + (trip || "غير محددة") +
"<br>المقعد: " + (seat || "غير محدد");



function savePassenger(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;


if(name === "" || phone === ""){

alert("أدخل الاسم ورقم الهاتف");

return;

}


localStorage.setItem("passengerName", name);
localStorage.setItem("passengerPhone", phone);


window.location.href = "review.html";

}

</script>


</body>
</html>
