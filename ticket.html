

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التذكرة الإلكترونية - تذكرتي</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

.ticket{
    max-width:450px;
    margin:30px auto;
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 3px 10px #ccc;
}

.ticket h2{
    text-align:center;
    color:#0d6efd;
}

.item{
    margin:12px 0;
    font-size:18px;
}

.status{
    margin-top:20px;
    padding:12px;
    background:#198754;
    color:white;
    text-align:center;
    border-radius:10px;
    font-weight:bold;
}
</style>

</head>

<body>

<header>
<h1>🎫 التذكرة الإلكترونية</h1>
</header>


<div class="ticket">

<h2>تذكرتي</h2>

<div class="item">
🎟 رقم التذكرة: TK-000001
</div>

<div class="item">
🚌 الشركة: الأرسنال
</div>

<div class="item">
📍 الرحلة: <span id="trip"></span>
</div>

<div class="item">
💺 المقعد: <span id="seat"></span>
</div>

<div class="item">
👤 اسم الراكب: <span id="name"></span>
</div>

<div class="item">
📞 الهاتف: <span id="phone"></span>
</div>

<div class="item">
💳 رقم العملية: <span id="transaction"></span>
</div>

<div class="item">
📅 موعد الرحلة: يحدد لاحقًا
</div>


<div class="status">
✅ التذكرة صالحة للسفر
</div>


<button onclick="history.back()" style="width:100%; margin-top:15px;">
⬅️ رجوع
</button> 
<script>

let from = localStorage.getItem("from");
let to = localStorage.getItem("to");

document.getElementById("trip").innerText = from + " → " + to;

document.getElementById("seat").innerText =
localStorage.getItem("seat");

document.getElementById("name").innerText =
localStorage.getItem("name");

document.getElementById("phone").innerText =
localStorage.getItem("phone");

document.getElementById("transaction").innerText =
localStorage.getItem("transaction");

</script>


</body>
</html>
