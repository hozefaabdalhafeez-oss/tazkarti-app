<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختيار المقعد - تذكرتي</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    text-align: center;
}

h1 {
    background: #0d6efd;
    color: white;
    padding: 20px;
    margin: 0;
}

.bus {
    background: white;
    width: 320px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 25px;
    box-shadow: 0 3px 10px #ccc;
}

.driver {
    background: #ddd;
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 10px;
}

.seats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

.seat {
    background: #198754;
    color: white;
    padding: 12px 5px;
    border-radius: 8px;
    cursor: pointer;
}

.seat:hover {
    background: #0d6efd;
}

.selected {
    background: #dc3545;
}

button {
    margin-top: 25px;
    padding: 12px 30px;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>🎫 اختر مقعدك</h1>

<div class="bus">

<div class="driver">
🚌 السائق
</div>

<div class="seats">

<div class="seat">1</div>
<div class="seat">2</div>
<div class="seat">3</div>
<div class="seat">4</div>

<div class="seat">5</div>
<div class="seat">6</div>
<div class="seat">7</div>
<div class="seat">8</div>

<div class="seat">9</div>
<div class="seat">10</div>
<div class="seat">11</div>
<div class="seat">12</div>

<div class="seat">13</div>
<div class="seat">14</div>
<div class="seat">15</div>
<div class="seat">16</div>

</div>

<button>تأكيد المقعد</button>

</div>


<script>
let seats = document.querySelectorAll(".seat");

seats.forEach(seat => {
    seat.onclick = function(){
        seat.classList.toggle("selected");
    }
});
</script>

</body>
</html>
