
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>اختيار المقعد - تذكرتي</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f7fa;
    text-align:center;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    padding:20px;
    font-size:28px;
}

.card{
    background:white;
    max-width:450px;
    margin:30px auto;
    padding:20px;
    border-radius:12px;
}

.seats{
    display:grid;
    grid-template-columns:repeat(4,60px);
    gap:10px;
    justify-content:center;
    margin-top:20px;
}

.seat{
    background:#198754;
    color:white;
    padding:15px 5px;
    border-radius:8px;
    cursor:pointer;
}

.seat.selected{
    background:#dc3545;
}

#info{
    margin-top:20px;
    font-size:18px;
}
</style>

</head>

<body>

<header>
🚌 تذكرتي
</header>


<div class="card">

<h2>اختيار المقعد</h2>

<p id="tripName"></p>


<div class="seats">

<div class="seat" onclick="chooseSeat(this)">1</div>
<div class="seat" onclick="chooseSeat(this)">2</div>
<div class="seat" onclick="chooseSeat(this)">3</div>
<div class="seat" onclick="chooseSeat(this)">4</div>

<div class="seat" onclick="chooseSeat(this)">5</div>
<div class="seat" onclick="chooseSeat(this)">6</div>
<div class="seat" onclick="chooseSeat(this)">7</div>
<div class="seat" onclick="chooseSeat(this)">8</div>

<div class="seat" onclick="chooseSeat(this)">9</div>
<div class="seat" onclick="chooseSeat(this)">10</div>
<div class="seat" onclick="chooseSeat(this)">11</div>
<div class="seat" onclick="chooseSeat(this)">12</div>

</div>


<p id="info">
لم يتم اختيار مقعد
</p>


</div>


<script>

let trip = localStorage.getItem("selectedTrip");

if(trip){

document.getElementById("tripName").innerHTML =
"الرحلة: " + trip;

}else{

document.getElementById("tripName").innerHTML =
"لم يتم اختيار رحلة";

}


function chooseSeat(seat){

document.querySelectorAll(".seat").forEach(function(s){

s.classList.remove("selected");

});


seat.classList.add("selected");


document.getElementById("info").innerHTML =
"تم اختيار المقعد رقم: " + seat.innerHTML;

}

</script>


</body>
</html>
