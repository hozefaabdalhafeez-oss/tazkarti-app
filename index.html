<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>اختبار 12345</title>

<style>
body{
    font-family: Arial;
    background:#f5f7fa;
    text-align:center;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    padding:20px;
    font-size:28px;
}

.box{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:15px;
}

.trip{
    border:2px solid #ddd;
    padding:15px;
    margin:10px;
    border-radius:10px;
    cursor:pointer;
}

.trip.selected{
    border-color:#0d6efd;
    background:#e7f0ff;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}
</style>

</head>

<body>

<header>
اختبار 12345
</header>

<div class="box">

<h2>اختر الرحلة</h2>

<div class="trip" onclick="selectTrip(this,'الخرطوم - دنقلا')">
الخرطوم → دنقلا
<br>
التحرك 5:30 صباحاً
</div>

<div class="trip" onclick="selectTrip(this,'الخرطوم - عطبرة')">
الخرطوم → عطبرة
<br>
التحرك 5:30 صباحاً
</div>

<div class="trip" onclick="selectTrip(this,'الخرطوم - بورتسودان')">
الخرطوم → بورتسودان
<br>
التحرك 5:30 صباحاً
</div>

<br>

<button onclick="goNext()">
اختر المقعد
</button>

</div>


<script>

let selectedTrip = "";

function selectTrip(element, trip){

    selectedTrip = trip;

    let trips = document.querySelectorAll(".trip");

    trips.forEach(function(item){
        item.classList.remove("selected");
    });

    element.classList.add("selected");

}


function goNext(){

    if(selectedTrip === ""){

        alert("اختر الرحلة أولاً");

    }else{

        alert("تم اختيار: " + selectedTrip);

        // لاحقاً نضع هنا الانتقال لصفحة المقاعد
        // window.location.href="seats.html";

    }

}

</script>

</body>
</html>
