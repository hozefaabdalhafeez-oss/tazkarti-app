<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تذكرتي</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    text-align:center;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    padding:20px;
    font-size:28px;
}

.card{
    background:white;
    max-width:450px;
    margin:30px auto;
    padding:20px;
    border-radius:12px;
}

select,button{
    width:90%;
    padding:15px;
    margin:10px;
    font-size:18px;
    border-radius:8px;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
}

button:disabled{
    background:#999;
}
</style>

</head>

<body>

<header>
🚌 تذكرتي
</header>


<div class="card">

<h2>احجز تذكرتك بسهولة</h2>

<p>اختر الرحلة</p>

<select id="trip">
<option value="">-- اختر الرحلة --</option>
<option value="الخرطوم - دنقلا">الخرطوم - دنقلا</option>
<option value="الخرطوم - عطبرة">الخرطوم - عطبرة</option>
<option value="الخرطوم - بورتسودان">الخرطوم - بورتسودان</option>
<option value="كسلا - الخرطوم">كسلا - الخرطوم</option>
</select>


<br>

<button id="seatBtn" disabled>
اختر المقعد
</button>


<p id="message"></p>

</div>


<script>

let trip = document.getElementById("trip");
let seatBtn = document.getElementById("seatBtn");
let message = document.getElementById("message");


trip.addEventListener("change", function(){

if(trip.value !== ""){

seatBtn.disabled = false;

message.innerHTML =
"تم اختيار الرحلة: " + trip.value;

}else{

seatBtn.disabled = true;

message.innerHTML = "";

}

});


seatBtn.onclick = function(){

localStorage.setItem("selectedTrip", trip.value);

window.location.href = "seats.html";

};


</script>

</body>
</html>
