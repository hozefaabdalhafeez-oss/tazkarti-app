<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تذكرتي</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    margin:0;
}

header {
    background:#0d6efd;
    color:white;
    padding:25px;
    text-align:center;
}

.logo {
    font-size:35px;
    font-weight:bold;
}

.container {
    padding:20px;
}

.card {
    background:white;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 3px 10px #ccc;
}

label {
    display:block;
    margin-top:10px;
    font-weight:bold;
}

select {
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    width:100%;
    font-size:16px;
}
</style>

</head>

<body>

<header>
<div class="logo">🎫 تذكرتي</div>
<p>احجز تذكرتك بسهولة</p>
</header>

<div class="container">

<div class="card">

<h2>ابحث عن رحلة</h2>

<label>شركة السفر</label>

<select id="company">
<option>الأرسنال</option>
<option>الرفاعي</option>
<option>الجودة</option>
<option>الأصيل</option>
<option>حدباي</option>
<option>بختان</option>
<option>أبو نخيلة</option>
<option>عرجون</option>
<option>فخر السودان</option>
<option>أنهار</option>
<option>العقيدة</option>
<option>ود سطيح</option>
<option>الحرمين</option>
<option>رويال</option>
<option>نفحات</option>
<option>جسكابو</option>
<option>شريان</option>
<option>العزيزية</option>
<option>عبدونتود</option>
</select>
<label>من</label>

<select id="from">
<option>الخرطوم</option>
<option>كسلا</option>
<option>عطبرة</option>
<option>بورتسودان</option>
<option>القضارف</option>
<option>مدني</option>
<option>شندي</option>
<option>دنقلا</option>
<option>مروي</option>
</select>


<label>إلى</label>

<select id="to">
<option>دنقلا</option>
<option>مروي</option>
<option>شندي</option>
<option>كسلا</option>
<option>بورتسودان</option>
<option>القضارف</option>
<option>مدني</option>
<option>الخرطوم</option>
</select>


<label>موعد التحرك</label>

<select id="time">
<option>5:30 صباحًا</option>
</select>


<label>السعر</label>

<select id="price">
<option>175</option>
</select>


<button onclick="goToSeats()">
اختيار المقعد
</button>


</div>


<div class="card">

<h2>رحلات مميزة</h2>

<p>🚌 الخرطوم → دنقلا</p>
<p>🚌 الخرطوم → بورتسودان</p>
<p>🚌 كسلا → الخرطوم</p>

</div>

    <script>

function goToSeats(){

localStorage.setItem(
"company",
document.getElementById("company").value
);

localStorage.setItem(
"from",
document.getElementById("from").value
);

localStorage.setItem(
"to",
document.getElementById("to").value
);

localStorage.setItem(
"time",
document.getElementById("time").value
);

localStorage.setItem(
"price",
document.getElementById("price").value
);


window.location.href="seats.html";

}

</script>


</body>
</html>
