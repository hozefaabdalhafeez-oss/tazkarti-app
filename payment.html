
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدفع - تذكرتي</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:450px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px #ccc;
}

.info{
    background:#eef5ff;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

label{
    display:block;
    margin:10px 0 5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>الدفع</h1>
</header>

<div class="container">

<div class="info">
<p><strong>طريقة الدفع:</strong> بنكك</p>
<p><strong>رقم الحساب:</strong> 123456789</p>
<p>بعد التحويل أدخل رقم العملية أو مرجع التحويل.</p>
</div>

<label>رقم العملية</label>
<input type="text" placeholder="أدخل رقم العملية">

<a href="ticket.html">
<button>تأكيد الدفع</button>
</a>

</div>

</body>
</html>
